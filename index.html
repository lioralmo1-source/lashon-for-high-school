<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לשון עברית י׳</title>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #f7f8fa;
  --surface:  #ffffff;
  --border:   #e8eaed;
  --text:     #0f1117;
  --muted:    #6b7280;
  --subtle:   #9ca3af;
  --blue:     #1a56db;
  --blue-lt:  #eff6ff;
  --green:    #15803d;
  --green-lt: #f0fdf4;
  --amber:    #b45309;
  --amber-lt: #fffbeb;
  --red:      #dc2626;
  --red-lt:   #fef2f2;
  --purple:   #6d28d9;
  --purple-lt:#faf5ff;
  --sidebar-w: 220px;
}
html { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); }
button, input, a { font-family: 'Heebo', sans-serif; }

/* ── Login ── */
#login-screen {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  background: #0d1117; padding: 1rem;
}
#login-screen::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 45% at 20% 40%, rgba(26,86,219,.2) 0%, transparent 65%),
    radial-gradient(ellipse 45% 55% at 80% 65%, rgba(109,40,217,.14) 0%, transparent 65%);
}
.login-card {
  position: relative; width: 100%; max-width: 375px;
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px; padding: 2.5rem 2rem; backdrop-filter: blur(16px);
}
.login-logo { font-size: 2.2rem; text-align: center; margin-bottom: .5rem; }
.login-title {
  font-family: 'Secular One', sans-serif;
  font-size: 1.35rem; color: #fff; text-align: center; margin-bottom: .2rem;
}
.login-sub { font-size: .75rem; color: rgba(255,255,255,.35); text-align: center; margin-bottom: 1.8rem; }
.lf-label { font-size: .7rem; font-weight: 700; color: rgba(255,255,255,.45); display: block; margin-bottom: .35rem; }
.lf-input {
  width: 100%; padding: .65rem .9rem; border-radius: 9px; direction: rtl;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14);
  color: #fff; font-size: .88rem; outline: none; transition: border-color .2s; margin-bottom: .85rem;
}
.lf-input::placeholder { color: rgba(255,255,255,.25); }
.lf-input:focus { border-color: #4d7cff; }
.lf-input.shake { animation: shake .3s; border-color: #f87171; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.btn-student {
  width: 100%; padding: .75rem; border: none; border-radius: 10px;
  background: var(--blue); color: #fff; font-size: .9rem; font-weight: 700;
  cursor: pointer; margin-bottom: .7rem; transition: all .18s;
}
.btn-student:hover { background: #1648b8; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(26,86,219,.4); }
.teacher-toggle {
  width: 100%; background: none; border: none; color: rgba(255,255,255,.28);
  font-size: .72rem; cursor: pointer; text-decoration: underline;
  text-underline-offset: 3px; transition: color .15s; padding: .2rem;
}
.teacher-toggle:hover { color: rgba(255,255,255,.55); }
#teacher-panel { display: none; margin-top: .9rem; border-top: 1px solid rgba(255,255,255,.08); padding-top: .9rem; }
#teacher-panel.open { display: block; }
.btn-teacher {
  width: 100%; padding: .7rem; border: none; border-radius: 9px;
  background: rgba(109,40,217,.65); color: #fff;
  font-size: .86rem; font-weight: 700; cursor: pointer; margin-top: .4rem; transition: all .18s;
}
.btn-teacher:hover { background: rgba(109,40,217,.9); }

/* ── App ── */
#app { display: none; min-height: 100vh; }
#app.on { display: flex; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sb-head {
  padding: 1.1rem 1rem .75rem;
  border-bottom: 1px solid var(--border);
}
.sb-logo { font-family: 'Secular One', sans-serif; font-size: .88rem; color: var(--blue); }
.sb-sub  { font-size: .64rem; color: var(--subtle); margin-top: .1rem; }
.sb-nav  { padding: .6rem .45rem; flex: 1; }
.sb-link {
  display: flex; align-items: center; gap: .5rem;
  padding: .48rem .7rem; border-radius: 7px; width: 100%;
  font-size: .78rem; font-weight: 600; color: var(--muted);
  border: none; background: none; cursor: pointer;
  text-align: right; transition: all .14s; margin-bottom: .1rem;
}
.sb-link:hover { background: var(--blue-lt); color: var(--blue); }
.sb-link.active { background: var(--blue-lt); color: var(--blue); }
.sb-link .sb-em { font-size: .95rem; flex-shrink: 0; }
.sb-foot {
  padding: .75rem .85rem; border-top: 1px solid var(--border);
}
.user-row {
  display: flex; align-items: center; gap: .5rem;
  background: var(--bg); border-radius: 8px; padding: .4rem .6rem; margin-bottom: .45rem;
}
.u-av {
  width: 25px; height: 25px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .66rem; font-weight: 900; color: #fff; flex-shrink: 0;
}
.u-av.t { background: var(--purple); }
.u-av.s { background: var(--green); }
.u-name { font-size: .78rem; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.role-tag {
  font-size: .6rem; font-weight: 800; padding: .12rem .45rem; border-radius: 999px;
  background: var(--purple-lt); color: var(--purple); border: 1px solid #ddd6fe;
  white-space: nowrap;
}
.btn-logout {
  width: 100%; padding: .38rem; border: 1px solid var(--border);
  border-radius: 7px; background: none; color: var(--subtle);
  font-size: .72rem; cursor: pointer; transition: all .14s;
}
.btn-logout:hover { background: var(--red-lt); color: var(--red); border-color: #fca5a5; }

/* ── Main ── */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* Top bar */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: .85rem 1.4rem; display: flex; align-items: center;
  position: sticky; top: 0; z-index: 40;
}
.tb-title { font-family: 'Secular One', sans-serif; font-size: .92rem; }
.tb-sub   { font-size: .68rem; color: var(--subtle); margin-top: .05rem; }
.tb-sp    { flex: 1; }

/* Progress banner */
.prog-banner {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: .85rem 1.4rem;
}
.prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
.prog-title  { font-size: .78rem; font-weight: 700; }
.prog-pct    { font-size: .82rem; font-weight: 800; color: var(--blue); }
.prog-track  { height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; }
.prog-fill   { height: 100%; background: linear-gradient(90deg, var(--blue), #60a5fa); border-radius: 999px; transition: width .55s ease; }
.prog-stats  { display: flex; gap: 1.2rem; margin-top: .5rem; }
.prog-stat   { font-size: .7rem; color: var(--muted); }
.prog-stat b { color: var(--text); font-weight: 700; }

/* Units list */
.units-wrap { padding: 1.1rem 1.4rem; }

/* Unit accordion */
.unit-block  { margin-bottom: .65rem; }
.unit-trigger {
  width: 100%; display: flex; align-items: center; gap: .7rem;
  background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
  padding: .85rem 1.1rem; cursor: pointer; text-align: right;
  transition: border-color .16s, box-shadow .16s;
}
.unit-trigger:hover { border-color: #93c5fd; box-shadow: 0 1px 8px rgba(26,86,219,.07); }
.unit-trigger.open  { border-color: var(--blue); border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-color: var(--border); }
.ut-em   { font-size: 1.15rem; flex-shrink: 0; }
.ut-body { flex: 1; min-width: 0; }
.ut-name { font-size: .9rem; font-weight: 800; }
.ut-meta { font-size: .68rem; color: var(--subtle); margin-top: .08rem; }
.ut-right { display: flex; align-items: center; gap: .6rem; flex-shrink: 0; }
.ut-bar-wrap { width: 64px; }
.ut-bar-track { height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; }
.ut-bar-fill  { height: 100%; background: var(--green); border-radius: 999px; }
.ut-bar-pct   { font-size: .62rem; color: var(--subtle); margin-top: .2rem; text-align: center; }
.ut-chev { font-size: .68rem; color: var(--subtle); transition: transform .22s; flex-shrink: 0; }
.unit-trigger.open .ut-chev { transform: rotate(180deg); }

.unit-body {
  background: var(--surface);
  border: 1px solid var(--blue); border-top: none;
  border-bottom-left-radius: 11px; border-bottom-right-radius: 11px;
  overflow: hidden; max-height: 0; transition: max-height .28s ease;
}
.unit-body.open { max-height: 3000px; }

/* Lesson row */
.lesson-row {
  display: flex; align-items: center; gap: .65rem;
  padding: .62rem 1.1rem; border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.lesson-row:last-child { border-bottom: none; }
.lesson-row:not(.locked):hover { background: #fafbfc; }
.lesson-row.locked { opacity: .48; }
.lr-em {
  width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: .9rem;
}
.lr-info { flex: 1; min-width: 0; }
.lr-short { font-size: .6rem; font-weight: 800; color: var(--subtle); text-transform: uppercase; letter-spacing: .05em; }
.lr-title { font-size: .84rem; font-weight: 700; line-height: 1.3; }
.lr-desc  { font-size: .7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lr-right { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
.lr-mins  { font-size: .65rem; color: var(--subtle); white-space: nowrap; }

/* Chips */
.chip { display: inline-flex; align-items: center; gap: .18rem; padding: .12rem .5rem; border-radius: 999px; font-size: .62rem; font-weight: 700; white-space: nowrap; }
.ch-open  { background: var(--green-lt); color: var(--green); }
.ch-lock  { background: var(--bg); color: var(--subtle); border: 1px solid var(--border); }
.ch-done  { background: var(--blue-lt); color: var(--blue); }
.ch-exam  { background: var(--amber-lt); color: var(--amber); }

/* Action buttons */
.lr-actions { display: flex; align-items: center; gap: .35rem; flex-shrink: 0; }
.btn-main {
  display: inline-flex; align-items: center; gap: .25rem;
  padding: .36rem .8rem; border: none; border-radius: 7px;
  font-size: .77rem; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: all .14s; text-decoration: none;
}
.btn-main.prim  { background: var(--blue); color: #fff; }
.btn-main.prim:hover { background: #1648b8; }
.btn-main.exam  { background: var(--amber); color: #fff; }
.btn-main.exam:hover { filter: brightness(.92); }
.btn-main.ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-main.ghost:hover { background: var(--border); }
.btn-main.dis   { background: var(--bg); color: var(--subtle); border: 1px solid var(--border); cursor: not-allowed; }

/* Teacher mini buttons */
.btn-t {
  display: inline-flex; align-items: center; gap: .2rem;
  padding: .28rem .6rem; border: none; border-radius: 6px;
  font-size: .7rem; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: all .14s; text-decoration: none;
}
.btn-t.sol  { background: var(--purple-lt); color: var(--purple); }
.btn-t.sol:hover  { background: #ede9fe; }
.btn-t.guide { background: var(--amber-lt); color: var(--amber); }
.btn-t.guide:hover { background: #fde68a; }
.btn-t.prev { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
.btn-t.prev:hover { background: var(--border); }

/* Done stamp */
.done-stamp {
  font-size: .6rem; font-weight: 700; color: var(--blue);
  background: var(--blue-lt); border-radius: 999px; padding: .1rem .45rem; white-space: nowrap;
}

/* Toast */
#toast {
  position: fixed; bottom: 1.3rem; right: 1.3rem; z-index: 9999;
  background: #1e293b; color: #fff; border-radius: 9px;
  padding: .65rem 1.1rem; font-size: .82rem; font-weight: 600;
  opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 660px) {
  .sidebar { display: none; }
  .units-wrap { padding: .75rem; }
  .prog-banner { padding: .75rem 1rem; }
  .lr-desc { display: none; }
}
</style>
</head>

  </nav>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <div>
        <div class="tb-title">לשון עברית — כיתה י׳</div>

</div>

       title:'גזרת המרובעים (מורחב)',desc:'העמקה בשורשים מרובעים — מבנה, בניינים ותצורות',
       file:'unit3_lesson2_mruba_ext_v3.html'},
      {id:'u3_l3',short:'שיעור 3',emoji:'🔤',color:'#831843',mins:45,locked:true,exam:false,
       title:'גזרת הנחים',desc:'פ"נ, ע"נ, ל"נ — דפוסי הטמעה ודגש',
       file:'unit3_lesson3_nun_v3.html'},
      {id:'u3_l4',short:'שיעור 4',emoji:'✌️',color:'#701a75',mins:45,locked:true,exam:false,
       title:'גזרת הכפולים',desc:'פעלים ע"ע — כפילות ומיזוג',
       file:'unit3_lesson4_doubled_v3.html'},
    ]
  }
];

// ══ STATE ══
const S = { role:'', name:'', prog:{} };
const LS = {
  get(k,fb=null){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch(e){return fb;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},
  del(k){try{localStorage.removeItem(k);}catch(e){}}
};

// ══ TOAST ══
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2800);
}

// ══ PASSWORD ══
async function hashPass(raw){
  if(!raw)return'';
  try{
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('lashon_v7_'+raw));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){let h=5381;for(let i=0;i<raw.length;i++)h=((h<<5)+h)^raw.charCodeAt(i);return'fb_'+(h>>>0).toString(16);}
}
async function verifyPass(raw){
  const stored=LS.get('lashon_tpass','');
  if(!stored)return raw===DEFAULT_PASS;
  return(await hashPass(raw))===stored;
}

// ══ LOGIN ══
function toggleTeacher(){
  const p=document.getElementById('teacher-panel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))setTimeout(()=>document.getElementById('tname').focus(),60);
}

function doStudentLogin(){
  const inp=document.getElementById('sname');
  const name=inp.value.trim();
  if(!name){
    inp.classList.add('shake');
    setTimeout(()=>inp.classList.remove('shake'),350);
    toast('⚠️ הזינו שם לפני הכניסה');
    return;
  }
  LS.del('lashon_tpass'); LS.del('lashon_tname');
  window.history.replaceState({},'',window.location.pathname);
  LS.set('lashon_role','student');
  LS.set('lashon_uname',name);
  document.getElementById('login-screen').style.display='none';
  enterApp('student',name);
}

async function doTeacherLogin(){
  const name=(document.getElementById('tname').value||'').trim();
  const pass=(document.getElementById('tpass').value||'').trim();
  if(!name){toast('⚠️ הזינו שם');document.getElementById('tname').focus();return;}
  if(!pass){toast('⚠️ הזינו סיסמה');document.getElementById('tpass').focus();return;}
  const ok=await verifyPass(pass);
  if(!ok){
    toast('❌ סיסמה שגויה');
    const pi=document.getElementById('tpass');pi.value='';pi.focus();
    return;
  }
  const h=await hashPass(pass);
  LS.set('lashon_tpass',h); LS.set('lashon_tname',name);
  LS.set('lashon_role','teacher'); LS.set('lashon_uname',name);
  window.location.href=window.location.pathname+'?role=teacher';
}

function doLogout(){
  ['lashon_role','lashon_uname','lashon_tpass','lashon_tname'].forEach(k=>LS.del(k));
  window.history.replaceState({},'',window.location.pathname);
  document.getElementById('app').classList.remove('on');
  document.getElementById('login-screen').style.removeProperty('display');
  document.getElementById('sname').value='';
  document.getElementById('tname').value='';
  document.getElementById('tpass').value='';
  document.getElementById('teacher-panel').classList.remove('open');
  S.role='';S.name='';
}

// ══ INIT ══
function initApp(){
  const params=new URLSearchParams(window.location.search);
  const urlRole=params.get('role');
  const savedRole=LS.get('lashon_role','');
  const tpass=LS.get('lashon_tpass','');

  if(urlRole==='teacher'&&!tpass){doLogout();return;}
  if(urlRole==='teacher'){
    const name=LS.get('lashon_tname','')||LS.get('lashon_uname','')||'מורה';
    LS.set('lashon_role','teacher');
    document.getElementById('login-screen').style.display='none';
    enterApp('teacher',name);return;
  }
  if(savedRole==='teacher'&&tpass){
    window.location.href=window.location.pathname+'?role=teacher';return;
  }
  if(savedRole==='student'){
    const name=LS.get('lashon_uname','')||'תלמיד/ה';
    document.getElementById('login-screen').style.display='none';
    enterApp('student',name);return;
  }
}

// ══ ENTER APP ══
function enterApp(role,name){
  S.role=role; S.name=name;
  S.prog=LS.get('lashon_prog_'+name,{});
  document.getElementById('app').classList.add('on');

  const av=document.getElementById('u-av');
  av.textContent=name.trim()[0]||(role==='teacher'?'מ':'ת');
  av.className='u-av '+(role==='teacher'?'t':'s');
  document.getElementById('u-name').textContent=name;
  document.getElementById('role-tag').style.display=role==='teacher'?'':'none';
  document.getElementById('prog-banner').style.display=role==='teacher'?'none':'';

  render();
}

// ══ RENDER ══
function render(){
  const isT=S.role==='teacher';

  // Sidebar
  document.getElementById('sb-nav').innerHTML=UNITS.map(u=>`
    <button class="sb-link" onclick="jumpUnit('${u.id}',this)">
      <span class="sb-em">${u.emoji}</span>
      <span>${u.label}: ${u.title}</span>
    </button>`).join('');

  // Progress bar
  if(!isT){
    const all=UNITS.flatMap(u=>u.lessons.filter(l=>!l.locked));
    const done=all.filter(l=>S.prog[l.id]?.done);
    const pct=all.length?Math.round(done.length/all.length*100):0;
    document.getElementById('prog-fill').style.width=pct+'%';
    document.getElementById('prog-pct').textContent=pct+'%';
    document.getElementById('prog-stats').innerHTML=
      `<span class="prog-stat"><b>${all.length}</b> שיעורים פתוחים</span>`+
      `<span class="prog-stat"><b>${done.length}</b> הושלמו</span>`+
      `<span class="prog-stat"><b>${all.length-done.length}</b> נותרו</span>`;
  }

  // Units
  const wrap=document.getElementById('units-wrap');
  wrap.innerHTML=UNITS.map(u=>buildUnit(u,isT)).join('');

  // Open first unit
  const first=wrap.querySelector('.unit-trigger');
  if(first)openUnit(first);
}

// ══ BUILD UNIT ══
function buildUnit(u,isT){
  const open=u.lessons.filter(l=>!l.locked);
  const done=open.filter(l=>S.prog[l.id]?.done);
  const pct=open.length?Math.round(done.length/open.length*100):0;

  return `
<div class="unit-block" id="ub-${u.id}">
  <button class="unit-trigger" onclick="toggleUnit(this)">
    <span class="ut-em">${u.emoji}</span>
    <div class="ut-body">
      <div class="ut-name">${u.label}: ${u.title}</div>
      <div class="ut-meta">${open.length} שיעורים פתוחים${!isT?' · '+done.length+' הושלמו':''}</div>
    </div>
    <div class="ut-right">
      ${!isT?`
      <div class="ut-bar-wrap">
        <div class="ut-bar-track"><div class="ut-bar-fill" style="width:${pct}%"></div></div>
        <div class="ut-bar-pct">${pct}%</div>
      </div>`:''}
    </div>
    <span class="ut-chev">▼</span>
  </button>
  <div class="unit-body">
    ${u.lessons.map(l=>buildLessonRow(l,isT)).join('')}
  </div>
</div>`;
}

// ══ BUILD LESSON ROW ══
function buildLessonRow(l,isT){
  const done=!!S.prog[l.id]?.done;
  const dDate=S.prog[l.id]?.date||'';
  const locked=l.locked;

  // URLs — teacherUrl never injected into student HTML
  const sUrl=l.file+'?role=student';
  const tUrl=isT?l.file+'?role=teacher':null;

  // Chip
  const chip=locked?'<span class="chip ch-lock">🔒 בהכנה</span>'
            :l.exam?'<span class="chip ch-exam">📝 מבחן</span>'
            :done  ?'<span class="chip ch-done">✓ הוגש</span>'
                   :'<span class="chip ch-open">פתוח</span>';

  // ─ Student actions ─ (teacherUrl never appears here)
  let actions='';
  if(!isT){
    if(locked){
      actions=`<button class="btn-main dis" disabled>🔒 טרם נפתח</button>`;
    } else if(done){
      actions=`<button class="btn-main ghost" onclick="openLesson('${sUrl}')">📖 פתח שוב</button>`;
    } else {
      actions=`<button class="btn-main ${l.exam?'exam':'prim'}" onclick="openLesson('${sUrl}')">
        ${l.exam?'📝 פתח מבחן':'▶ פתח שיעור'}
      </button>`;
    }
  }

  // ─ Teacher actions ─ (only rendered when isT is true — never in student DOM)
  if(isT){
    if(locked){
      actions=`<a href="${tUrl}" class="btn-t guide" target="_blank">📋 טיוטה</a>`;
    } else {
      actions=`
        <a href="${tUrl}" class="btn-t sol" target="_blank">🔑 פתרונות</a>
        <a href="${tUrl}" class="btn-t guide" target="_blank">📋 מדריך</a>
        <a href="${sUrl}" class="btn-t prev" target="_blank">👁</a>`;
    }
  }

  return `
<div class="lesson-row${locked?' locked':''}">
  <div class="lr-em" style="background:${l.color}1a">${l.emoji}</div>
  <div class="lr-info">
    <div class="lr-short">${l.short}</div>
    <div class="lr-title">${l.title}</div>
    <div class="lr-desc">${l.desc}</div>
  </div>
  <div class="lr-right">
    ${chip}
    <span class="lr-mins">⏱ ${l.mins}′</span>
    ${done&&dDate?`<span class="done-stamp">✓ ${dDate}</span>`:''}
  </div>
  <div class="lr-actions">${actions}</div>
</div>`;
}

// ══ ACCORDION ══
function toggleUnit(trigger){
  trigger.classList.contains('open')?closeUnit(trigger):openUnit(trigger);
}
function openUnit(trigger){
  trigger.classList.add('open');
  trigger.nextElementSibling.classList.add('open');
  const uid=trigger.closest('.unit-block').id.replace('ub-','');
  document.querySelectorAll('.sb-link').forEach(l=>{
    l.classList.toggle('active',l.getAttribute('onclick')?.includes(uid));
  });
}
function closeUnit(trigger){
  trigger.classList.remove('open');
  trigger.nextElementSibling.classList.remove('open');
}
function jumpUnit(uid,sbLink){
  const el=document.getElementById('ub-'+uid);
  if(!el)return;
  const trigger=el.querySelector('.unit-trigger');
  if(!trigger.classList.contains('open'))openUnit(trigger);
  el.scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.sb-link').forEach(l=>l.classList.toggle('active',l===sbLink));
}

// ══ OPEN LESSON ══
function openLesson(url){window.open(url,'_blank');}

// ══ LESSON DONE SIGNAL ══
window.lessonDone=function(id,date){
  S.prog[id]={done:true,date:date||new Date().toLocaleDateString('he-IL')};
  LS.set('lashon_prog_'+S.name,S.prog);
  render();
  toast('✅ השיעור הוגש בהצלחה!');
};

// ══ BOOT ══
initApp();
</script>
