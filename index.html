<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>לשון Lesson — יחידה 1</title>
<link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f8; --surface: #ffffff; --surface2: #f8f9fb; --border: #e4e7ef;
  --text: #0d1424; --muted: #6b7594; --blue: #1a56db; --blue-dk: #1340b0;
  --success: #059669;
}
* { box-sizing: border-box; font-family: 'Heebo', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

/* Header */
.main-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 100;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { width: 35px; height: 35px; background: var(--blue); color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Secular One'; font-size: 1.2rem; }
.brand-text h1 { margin: 0; font-size: 1.1rem; font-family: 'Secular One'; color: var(--blue); }

/* Welcome Screen */
.welcome-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; text-align: center; padding: 2rem;
}
.welcome-screen h2 { font-family: 'Secular One'; font-size: 2.5rem; margin-bottom: 1rem; color: var(--blue); }
.login-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; width: 100%; max-width: 600px; margin-top: 2rem; }
.login-card {
  background: var(--surface); padding: 2rem; border-radius: 20px; border: 1px solid var(--border);
  cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 1rem;
}
.login-card:hover { transform: translateY(-5px); border-color: var(--blue); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
.login-card i { font-size: 3rem; }
.login-card h3 { margin: 0; font-family: 'Secular One'; }

/* Main Content (Hidden by default) */
#main-app { display: none; padding: 2rem 1.5rem; max-width: 1000px; margin: 0 auto; }
.user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: #fff; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); }

/* Grid */
.lessons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem;
  text-decoration: none; color: inherit; position: relative; transition: 0.2s;
}
.card:hover { border-color: var(--blue); transform: translateY(-3px); }
.card.done::after { content: '✓'; position: absolute; top: 1rem; left: 1rem; background: var(--success); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
.card-num { color: var(--blue); font-weight: 800; font-size: 0.8rem; }
.card-title { font-family: 'Secular One'; margin: 0.5rem 0; }

/* Overlays */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
.overlay.open { display: flex; }
.modal { background: #fff; padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; }
.modal input { width: 100%; padding: 12px; margin: 1rem 0; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; text-align: center; }
.btn-primary { background: var(--blue); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
.btn-primary:hover { background: var(--blue-dk); }
</style>
</head>
<body>

<header class="main-header">
  <div class="brand"><div class="brand-logo">ל</div><div class="brand-text"><h1>לשון Lesson</h1></div></div>
  <button onclick="logout()" id="logout-btn" style="display:none; background:none; border:1px solid var(--border); padding:5px 12px; border-radius:6px; cursor:pointer;">יציאה</button>
</header>

<section id="welcome-screen" class="welcome-screen">
  <h2>ברוכים הבאים</h2>
  <p>למידה דיגיטלית חכמה לבגרות בלשון</p>
  <div class="login-cards">
    <div class="login-card" onclick="openStudentModal()">
      <span>🎓</span>
      <h3>כניסת תלמיד</h3>
    </div>
    <div class="login-card" onclick="openTeacherModal()">
      <span>👨‍🏫</span>
      <h3>כניסת מורה</h3>
    </div>
  </div>
</section>

<main id="main-app">
  <div class="user-bar">
    <div>שלום, <strong id="display-name"></strong></div>
    <div id="user-type-label" style="font-size: 0.8rem; color: var(--muted);"></div>
  </div>

  <div class="lessons-grid">
    <a href="unit1_lesson0_intro.html" class="card" data-lesson-id="L0"><div class="card-num">שיעור 0</div><h3 class="card-title">מבוא וחלקי הדיבר</h3></a>
    <a href="lesson1_shoresh_binyamin_v3.html" class="card" data-lesson-id="L1"><div class="card-num">שיעור 1</div><h3 class="card-title">שורש ובניינים</h3></a>
    <a href="lesson2_binyan_kal_v3.html" class="card" data-lesson-id="L2"><div class="card-num">שיעור 2</div><h3 class="card-title">בניין קל</h3></a>
    <a href="lesson3_binyanim_kvedim_v3.html" class="card" data-lesson-id="L3"><div class="card-num">שיעור 3</div><h3 class="card-title">בניינים כבדים</h3></a>
    <a href="lesson4.html" class="card" data-lesson-id="L4"><div class="card-num">שיעור 4</div><h3 class="card-title">שם המספר</h3></a>
    <a href="lesson5.html" class="card" data-lesson-id="L5"><div class="card-num">שיעור 5</div><h3 class="card-title">חזרה גנרלית</h3></a>
    <a href="lesson6.html" class="card" data-lesson-id="L6"><div class="card-num">שיעור 6</div><h3 class="card-title">מבחן מסכם</h3></a>
  </div>
</main>

<div id="student-modal" class="overlay">
  <div class="modal">
    <h3>איך קוראים לך?</h3>
    <input type="text" id="student-name-input" placeholder="הכנס שם מלא...">
    <button class="btn-primary" onclick="loginAsStudent()">התחלת למידה</button>
  </div>
</div>

<div id="teacher-modal" class="overlay">
  <div class="modal">
    <h3>כניסת מורה</h3>
    <input type="password" id="teacher-pass-input" placeholder="קוד גישה...">
    <button class="btn-primary" onclick="loginAsTeacher()">כניסה</button>
  </div>
</div>

<script>
const LS = {
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  get: (k,def) => { try { return JSON.parse(localStorage.getItem(k)) || def; } catch(e) { return def; } }
};

function openStudentModal() { document.getElementById('student-modal').classList.add('open'); }
function openTeacherModal() { document.getElementById('teacher-modal').classList.add('open'); }

function loginAsStudent() {
  const name = document.getElementById('student-name-input').value.trim();
  if(!name) return alert("אנא הזן שם");
  LS.set('lashon_student_name', name);
  LS.set('user_type', 'student');
  startApp(name, 'תלמיד');
}

function loginAsTeacher() {
  const pass = document.getElementById('teacher-pass-input').value;
  if(pass === '1234') { // הסיסמה היא 1234
    LS.set('user_type', 'teacher');
    startApp('מורה יקר/ה', 'ניהול מורה');
  } else {
    alert("קוד שגוי");
  }
}

function startApp(name, label) {
  document.getElementById('student-modal').classList.remove('open');
  document.getElementById('teacher-modal').classList.remove('open');
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'block';
  document.getElementById('display-name').innerText = name;
  document.getElementById('user-type-label').innerText = label;
  
  // טעינת התקדמות
  const storageKey = 'lashon_prog_' + (LS.get('lashon_student_name', 'anonymous'));
  const prog = LS.get(storageKey, {});
  document.querySelectorAll('.card').forEach(card => {
    const lid = card.getAttribute('data-lesson-id');
    if(prog[lid] && prog[lid].done) card.classList.add('done');
  });
}

function logout() {
  localStorage.removeItem('user_type');
  location.reload();
}

// בדיקה אם המשתמש כבר מחובר
window.onload = () => {
  const userType = LS.get('user_type', null);
  const name = LS.get('lashon_student_name', '');
  if(userType === 'student' && name) startApp(name, 'תלמיד');
  if(userType === 'teacher') startApp('מורה יקר/ה', 'ניהול מורה');
};
</script>
</body>
</html>
